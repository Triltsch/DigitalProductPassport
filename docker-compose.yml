services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dpp}
      POSTGRES_USER: ${POSTGRES_USER:-dpp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      # Read by infra/postgres/init/01-keycloak-db.sh which runs ONLY on first
      # container start when the postgres_data volume is empty. Changing these
      # values later has no effect until the volume is recreated (`down -v`).
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME:-dpp}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER:-dpp}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dpp} -d ${POSTGRES_DB:-dpp}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dpp_internal

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dpp_internal

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-changeme}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - dpp_internal

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-dpp}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-dpp}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-changeme}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    networks:
      - dpp_internal

  backend:
    image: python:3.12-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: ["python", "-m", "http.server", "8000", "--directory", "/workspace/backend"]
    volumes:
      - ./:/workspace
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://dpp:changeme@postgres:5432/dpp}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/dpp}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-changeme}
      KEYCLOAK_FRONTEND_CLIENT_ID: ${KEYCLOAK_FRONTEND_CLIENT_ID:-dpp-frontend}
      KEYCLOAK_BACKEND_CLIENT_ID: ${KEYCLOAK_BACKEND_CLIENT_ID:-dpp-backend}
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_ISSUER_URL:-http://keycloak:8080/realms/dpp}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-dpp-backend}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-RS256}
      KEYCLOAK_PRELOAD_JWKS: ${KEYCLOAK_PRELOAD_JWKS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      minio:
        condition: service_started
      keycloak:
        condition: service_started
    # Traefik routing is driven by the file provider (infra/traefik/dynamic.yml).
    # These labels have no effect and are kept only as documentation for the
    # intended routing contract should the Docker provider be re-enabled.
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${BACKEND_HOSTNAME:-api.dpp.localhost}`)
      - traefik.http.routers.backend.entrypoints=web
      - traefik.http.services.backend.loadbalancer.server.port=8000
    networks:
      - dpp_internal
      - dpp_public

  frontend:
    image: python:3.12-alpine
    restart: unless-stopped
    working_dir: /workspace
    command: ["python", "-m", "http.server", "5173", "--directory", "/workspace/frontend/public"]
    volumes:
      - ./:/workspace
    depends_on:
      backend:
        condition: service_started
    # Traefik routing is driven by the file provider (infra/traefik/dynamic.yml).
    # These labels have no effect and are kept only as documentation for the
    # intended routing contract should the Docker provider be re-enabled.
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${FRONTEND_HOSTNAME:-dpp.localhost}`)
      - traefik.http.routers.frontend.entrypoints=web
      - traefik.http.services.frontend.loadbalancer.server.port=5173
    networks:
      - dpp_public

  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
    volumes:
      - ./infra/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    networks:
      - dpp_public

networks:
  dpp_internal:
    name: dpp_internal
    driver: bridge
    internal: true
  dpp_public:
    name: dpp_public
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  minio_data:
  keycloak_data:
